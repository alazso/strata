name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build artifacts only; do not publish a release
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          GRADLE_VERSION="$(sed -n 's/^version=//p' gradle.properties | tr -d '[:space:]')"
          if [ -z "$GRADLE_VERSION" ]; then
            echo "Could not read version from gradle.properties" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"
            if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
              echo "Tag $TAG (${TAG_VERSION}) does not match gradle.properties (${GRADLE_VERSION})" >&2
              exit 1
            fi
          else
            TAG="v${GRADLE_VERSION}"
          fi
          echo "version=${GRADLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip if release already fully published
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSET_COUNT="$(gh release view "$TAG" --json assets -q '.assets | length')"
          if [ "$ASSET_COUNT" -ge 1 ]; then
            echo "Release $TAG already published; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        if: steps.published.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        if: steps.published.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        if: steps.published.outputs.skip != 'true'
        run: ./gradlew build --no-configuration-cache --stacktrace

      - name: Stage release artifacts
        if: steps.published.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="release-artifacts"
          mkdir -p "$STAGING"
          # The shadow JAR (classifier "plugin") is the server-side installable.
          # Rename it to the plain name for server owners.
          cp "strata-plugin/build/libs/strata-${VERSION}-plugin.jar" "$STAGING/strata-${VERSION}.jar"
          ls -lh "$STAGING"

      - name: Upload artifact bundle
        if: steps.published.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.tag }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.published.outputs.skip != 'true' && (github.event_name == 'push' || inputs.dry_run != true)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          STAGING="release-artifacts"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$STAGING"/* --clobber
          else
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --generate-notes \
              "$STAGING"/*
          fi

      - name: Publish API JAR to repo.alaz.so
        if: steps.published.outputs.skip != 'true' && (github.event_name == 'push' || inputs.dry_run != true)
        env:
          ALAZSO_REPO_USER: ${{ secrets.ALAZSO_REPO_USER }}
          ALAZSO_REPO_TOKEN: ${{ secrets.ALAZSO_REPO_TOKEN }}
        run: ./gradlew :strata-api:publishLibraryPublicationToAlazsoRepository --no-configuration-cache --stacktrace

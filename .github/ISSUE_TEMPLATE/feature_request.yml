name: Feature Request
description: Suggest a new feature or improvement
labels: [ "enhancement" ]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it clearly so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use-case are you trying to enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about?
